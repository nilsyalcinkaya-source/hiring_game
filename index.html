<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiring Game: A research about winner hiring profiles.</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #1a1a1a; color: #ffffff; font-family: 'Courier Prime', monospace;
            text-align: center; margin: 0; display: flex; flex-direction: column; 
            justify-content: center; height: 100vh; overflow: hidden;
        }

        #role-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 1000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }

        #header-container { margin-bottom: 20px; }
        h1 { font-size: 28px; color: #00ff00; text-shadow: 2px 2px #000; margin: 0; }
        p.subtitle { font-size: 18px; color: #aaaaaa; margin-top: 10px; }

        #arena { 
            position: relative; width: 800px; height: 250px; 
            margin: 0 auto; border-bottom: 4px solid #00ff00; 
        }

        .character { 
            position: absolute; bottom: 0; width: 160px; height: 200px; 
            background-size: contain; background-repeat: no-repeat; 
            background-position: bottom center; transition: all 0.3s ease-out; z-index: 1;
        }
        
        #left-char { left: 50px; }
        #right-char { right: 50px; transform: scaleX(-1); }     

        #cards-container { 
            display: flex; justify-content: center; gap: 30px; 
            width: 1100px; margin: 30px auto 0; 
        }

        .candidate-card { 
            border: 4px solid #00ff00; padding: 25px; width: 480px; 
            cursor: pointer; background: #000; box-shadow: 0 0 10px rgba(0,255,0,0.2);
            display: flex; flex-direction: column; text-align: left; transition: all 0.2s ease;
        }

        .candidate-card:hover { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; transform: translateY(-5px); }
        h2 { font-size: 22px; color: #ff00ff; margin: 0 0 15px 0; font-weight: 700; text-transform: uppercase; }
        .desc { font-size: 17px; line-height: 1.5; color: #ffffff; font-weight: 400; }

        .selected-card { border-color: #ff00ff !important; box-shadow: 0 0 30px #ff00ff !important; }
        .attack-effect { filter: brightness(1.3) !important; z-index: 10 !important; }
        .defeat-effect { 
            opacity: 0; transform: translateY(-40px) rotate(20deg) scale(0.7) !important; 
            filter: grayscale(1) brightness(0.5) !important; transition: 0.6s ease-in;
        }

        #final-screen { display: none; border: 8px double #ff00ff; padding: 40px; width: 600px; margin: 0 auto; background: #000; }
        
        button {
            font-family: 'Courier Prime', monospace; font-weight: 700; font-size: 18px;
            padding: 12px 25px; cursor: pointer; background: #00ff00; border: none; 
            color: #000; margin: 10px;
        }
        button:hover { background: #ff00ff; color: #fff; }

        @media (max-width: 768px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; padding: 20px 0; justify-content: flex-start; }
            #arena { width: 100%; height: 160px; }
            .character { width: 100px; height: 130px; }
            #cards-container { width: 100%; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; }
            .candidate-card { width: 85%; padding: 15px; }
            h1 { font-size: 20px; }
            #final-screen { width: 85%; padding: 25px; }
        }
    </style>
</head>
<body>

    <div id="role-overlay">
        <h1>SELECT YOUR ROLE</h1>
        <p class="subtitle" style="margin-bottom:20px;">In other words, tell me about yourself... :) </p>
        <div>
            <button onclick="startWithRole('HR Expert')">HR EXPERT</button>
            <button onclick="startWithRole('UX Designer / Lead')">DESIGN LEAD</button>
            <button onclick="startWithRole('Other')">OTHER</button>
        </div>
    </div>

    <div id="game-layout">
        <div id="header-container">
            <h1 id="round-title">The Knight Tournament of Creative Workers</h1>
            <p class="subtitle">Whom beats whom? Please choose a knight, your majesty...</p>
        </div>

        <div id="arena">
            <div id="left-char" class="character"></div>
            <div id="right-char" class="character"></div>
        </div>

        <div id="cards-container">
            <div id="left-card" class="candidate-card" onclick="select('left')" onmouseover="hoverChar('left', true)" onmouseout="hoverChar('left', false)">
                <h2 id="left-name">Loading...</h2>
                <div id="left-desc" class="desc"></div>
            </div>
            <div id="right-card" class="candidate-card" onclick="select('right')" onmouseover="hoverChar('right', true)" onmouseout="hoverChar('right', false)">
                <h2 id="right-name">Loading...</h2>
                <div id="right-desc" class="desc"></div>
            </div>
        </div>
    </div>

    <div id="final-screen">
        <h1 style="color: #00ff00;">TOURNAMENT CHAMPION:</h1>
        <h2 id="winner-name" style="font-size: 32px; margin: 20px 0;"></h2>
        <p style="font-size: 18px; line-height: 1.6;">Ladies and gentleman, the choice has been made...<br>Congratulations!</p>
        <button onclick="location.reload()">RESTART TOURNAMENT?</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxThkNd09SojK-jyuDO0aVQBJe7L7_JtPM4lN_hS0kfNcAmemMmDIOzEdXBUvU25IU/exec'; 
        
        const candidates = [
            { name: "The Veteran Soul", desc: "10+ years of total experience, but zero years in this job title.", img_idle: "Ancient_Idle_MiniCavalierMan.gif", img_attack: "Ancient_Attack1_MiniCavalierMan.gif", img_walk: "Ancient_Walk_MiniCavalierMan.gif" },
            { name: "The Title specialist", desc: "3 years of experience, but only within this specific title.", img_idle: "Uncommon_Idle_MiniCavalierMan.gif", img_attack: "Uncommon_Attack1_MiniCavalierMan.gif", img_walk: "Uncommon_Walk_MiniCavalierMan.gif" },
            
            { name: "The Gap Strategist", desc: "10+ years of history, but a 3-year parenting gap.", img_idle: "Ancient_Idle_MiniCavalierMan.gif", img_attack: "Ancient_Attack1_MiniCavalierMan.gif", img_walk: "Ancient_Walk_MiniCavalierMan.gif" },
            { name: "The Linear Mid-Weight", desc: "Continuous employment, but only 3-5 year work experience.", img_idle: "Common_Idle_MiniCavalierMan.gif", img_attack: "Common_Attack1_MiniCavalierMan.gif", img_walk: "Common_Walk_MiniCavalierMan.gif" },
            
            { name: "The Award-Winner", desc: "Award-winning creativity, but weak in technical execution.", img_idle: "Epic_Idle_MiniCavalierMan.gif", img_attack: "Epic_Attack1_MiniCavalierMan.gif", img_walk: "Epic_Walk_MiniCavalierMan.gif" },
            { name: "The Tool-Master", desc: "Strong technical execution, but lacks original creative vision.", img_idle: "Epic_2_Idle_MiniCavalierMan.gif", img_attack: "Epic_2_Attack1_MiniCavalierMan.gif", img_walk: "Epic_2_Walk_MiniCavalierMan.gif" },
            
            { name: "The Conceptualist", desc: "Rich portfolio, but consists mostly of conceptual projects.", img_idle: "Rare_Idle_MiniCavalierMan.gif", img_attack: "Rare_Attack1_MiniCavalierMan.gif", img_walk: "Rare_Walk_MiniCavalierMan.gif" },
            { name: "The Shipper", desc: "Shipped products, but lacks a visionary or diverse portfolio.", img_idle: "Legendary_Idle_MiniCavalierMan.gif", img_attack: "Legendary_Attack1_MiniCavalierMan.gif", img_walk: "Legendary_Walk_MiniCavalierMan.gif" },
            
            { name: "The Startup Agile", desc: "Startup and freelance agility, but no corporate experience.", img_idle: "Rare_Idle_MiniCavalierMan.gif", img_attack: "Rare_Attack1_MiniCavalierMan.gif", img_walk: "Rare_Walk_MiniCavalierMan.gif" },
            { name: "The Corporate Guard", desc: "Corporate discipline, but lacks startup-level flexibility.", img_idle: "Legendary_Idle_MiniCavalierMan.gif", img_attack: "Legendary_Attack1_MiniCavalierMan.gif", img_walk: "Legendary_Walk_MiniCavalierMan.gif" },
            
            { name: "The Hybrid Voyager", desc: "Diverse background, but lacks a linear career path.", img_idle: "Rare_Idle_MiniCavalierMan.gif", img_attack: "Rare_Attack1_MiniCavalierMan.gif", img_walk: "Rare_Walk_MiniCavalierMan.gif" },
            { name: "The Specialist", desc: "Specialized linear path, but lacks a broad strategic view.", img_idle: "Common_Idle_MiniCavalierMan.gif", img_attack: "Common_Attack1_MiniCavalierMan.gif", img_walk: "Common_Walk_MiniCavalierMan.gif" },
            
            { name: "The Self-Taught", desc: "Constant self-learner, but no formal degree in this field.", img_idle: "Uncommon_Idle_MiniCavalierMan.gif", img_attack: "Uncommon_Attack1_MiniCavalierMan.gif", img_walk: "Uncommon_Walk_MiniCavalierMan.gif" },
            { name: "The Academic", desc: "Formal degree in the field, but lacks recent learning effort.", img_idle: "Epic_Idle_MiniCavalierMan.gif", img_attack: "Epic_Attack1_MiniCavalierMan.gif", img_walk: "Epic_Walk_MiniCavalierMan.gif" },
            
            { name: "The Global Citizen", desc: "Fluent English for global roles, but weak local language skills.", img_idle: "Legendary_2_Idle_MiniCavalierMan.gif", img_attack: "Legendary_2_Attack1_MiniCavalierMan.gif", img_walk: "Legendary_2_Walk_MiniCavalierMan.gif" },
            { name: "The Local Hero", desc: "Native local speaker, but no experience in global teams.", img_idle: "Uncommon_Idle_MiniCavalierMan.gif", img_attack: "Uncommon_Attack1_MiniCavalierMan.gif", img_walk: "Uncommon_Walk_MiniCavalierMan.gif" }
        ];

        let currentRound = [...candidates].sort(() => 0.5 - Math.random());
        let nextRound = [];
        let index = 0;
        let roundNames = { 16: "ROUND OF 16", 8: "QUARTER-FINALS", 4: "SEMI-FINALS", 2: "THE GRAND FINAL" };
        let isProcessing = false;
        let userRole = "";

        function startWithRole(role) {
            userRole = role;
            document.getElementById('role-overlay').style.display = 'none';
            update();
        }

        function isMobile() { return window.innerWidth <= 768; }

        function update() {
            if (index < currentRound.length) {
                const c1 = currentRound[index];
                const c2 = currentRound[index + 1];
                document.getElementById('round-title').innerText = roundNames[currentRound.length] || "TOURNAMENT";
                document.getElementById('left-name').innerText = c1.name;
                document.getElementById('left-desc').innerText = c1.desc;
                document.getElementById('right-name').innerText = c2.name;
                document.getElementById('right-desc').innerText = c2.desc;
                resetArena();
            }
        }

        function resetArena() {
            const leftChar = document.getElementById('left-char');
            const rightChar = document.getElementById('right-char');
            leftChar.style.backgroundImage = `url('assets/${currentRound[index].img_idle}')`;
            rightChar.style.backgroundImage = `url('assets/${currentRound[index+1].img_idle}')`;
            leftChar.className = 'character'; rightChar.className = 'character';
            const baseDist = isMobile() ? "10px" : "50px";
            leftChar.style.left = baseDist; rightChar.style.right = baseDist;
            leftChar.style.filter = "none"; rightChar.style.filter = "none";
            leftChar.style.transform = "none"; rightChar.style.transform = "scaleX(-1)"; 
        }

        function hoverChar(side, isHovering) {
            if (isProcessing) return;
            const char = document.getElementById(side + '-char');
            const candidate = side === 'left' ? currentRound[index] : currentRound[index+1];
            const baseDist = isMobile() ? "10px" : "50px";
            const hoverDist = isMobile() ? "20%" : "180px";
            if (isHovering) {
                char.style.backgroundImage = `url('assets/${candidate.img_walk}')`;
                side === 'left' ? char.style.left = hoverDist : char.style.right = hoverDist;
            } else {
                char.style.backgroundImage = `url('assets/${candidate.img_idle}')`;
                side === 'left' ? char.style.left = baseDist : char.style.right = baseDist;
            }
        }

        function select(side) {
            if (isProcessing) return;
            isProcessing = true;

            const winnerIdx = side === 'left' ? index : index + 1;
            const loserIdx = side === 'left' ? index + 1 : index;
            const winner = currentRound[winnerIdx];
            const loser = currentRound[loserIdx];
            const roundName = roundNames[currentRound.length];

            sendDataToSheets(winner.name, loser.name, roundName, "MATCH_RESULT");

            const winnerChar = document.getElementById(side + '-char');
            const loserChar = document.getElementById((side === 'left' ? 'right' : 'left') + '-char');
            const selectedCard = document.getElementById(side + '-card');
            const attackDist = isMobile() ? "35%" : "280px";

            selectedCard.classList.add('selected-card');
            winnerChar.style.backgroundImage = `url('assets/${winner.img_attack}')`;
            winnerChar.classList.add('attack-effect');
            if(side === 'right') winnerChar.style.transform = "scaleX(-1)";
            side === 'left' ? winnerChar.style.left = attackDist : winnerChar.style.right = attackDist;
            loserChar.classList.add('defeat-effect');

            nextRound.push(winner);
            index += 2;

            setTimeout(() => {
                selectedCard.classList.remove('selected-card');
                isProcessing = false;
                if (index >= currentRound.length) {
                    if (nextRound.length === 1) { finish(nextRound[0]); } 
                    else { currentRound = [...nextRound]; nextRound = []; index = 0; update(); }
                } else { update(); }
            }, 1200);
        }

        function sendDataToSheets(winner, loser, round, status) {
            fetch(scriptURL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ 
                    role: userRole, winner: winner, loser: loser, round: round, status: status 
                }) 
            });
        }

        function finish(winner) {
            document.getElementById('game-layout').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('winner-name').innerText = winner.name;
            sendDataToSheets(winner.name, "N/A", "FINAL", "CHAMPION");
        }
    </script>
</body>
</html>
