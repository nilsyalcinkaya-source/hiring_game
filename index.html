<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiring Maze: Research Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #1a1a1a; color: #ffffff; font-family: 'Courier Prime', monospace;
            text-align: center; margin: 0; display: flex; flex-direction: column; 
            justify-content: center; height: 100vh; overflow: hidden;
        }

        /* Giriş Ekranı (Role Selection) */
        #role-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 1000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }

        #header-container { margin-bottom: 20px; }
        h1 { font-size: 28px; color: #00ff00; text-shadow: 2px 2px #000; margin: 0; }
        p.subtitle { font-size: 18px; color: #aaaaaa; margin-top: 10px; }

        #arena { 
            position: relative; width: 800px; height: 250px; 
            margin: 0 auto; border-bottom: 4px solid #00ff00; 
        }

        .character { 
            position: absolute; bottom: 0; width: 160px; height: 200px; 
            background-size: contain; background-repeat: no-repeat; 
            background-position: bottom center; transition: all 0.3s ease-out; z-index: 1;
        }
        
        #left-char { left: 50px; }
        #right-char { right: 50px; transform: scaleX(-1); }     

        #cards-container { 
            display: flex; justify-content: center; gap: 30px; 
            width: 1100px; margin: 30px auto 0; 
        }

        .candidate-card { 
            border: 4px solid #00ff00; padding: 25px; width: 480px; 
            cursor: pointer; background: #000; box-shadow: 0 0 10px rgba(0,255,0,0.2);
            display: flex; flex-direction: column; text-align: left; transition: all 0.2s ease;
        }

        .candidate-card:hover { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; transform: translateY(-5px); }
        h2 { font-size: 22px; color: #ff00ff; margin: 0 0 15px 0; font-weight: 700; text-transform: uppercase; }
        .desc { font-size: 17px; line-height: 1.5; color: #ffffff; font-weight: 400; }

        .selected-card { border-color: #ff00ff !important; box-shadow: 0 0 30px #ff00ff !important; }
        .attack-effect { filter: brightness(1.3) !important; z-index: 10 !important; }
        .defeat-effect { 
            opacity: 0; transform: translateY(-40px) rotate(20deg) scale(0.7) !important; 
            filter: grayscale(1) brightness(0.5) !important; transition: 0.6s ease-in;
        }

        #final-screen { display: none; border: 8px double #ff00ff; padding: 40px; width: 600px; margin: 0 auto; background: #000; }
        
        button {
            font-family: 'Courier Prime', monospace; font-weight: 700; font-size: 18px;
            padding: 12px 25px; cursor: pointer; background: #00ff00; border: none; 
            color: #000; margin: 10px;
        }
        button:hover { background: #ff00ff; color: #fff; }

        /* Mobil Düzen */
        @media (max-width: 768px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; padding: 20px 0; justify-content: flex-start; }
            #arena { width: 100%; height: 160px; }
