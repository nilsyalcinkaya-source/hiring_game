<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hiring Maze: 90s Arcade Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Courier Prime', monospace;
            text-align: center; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        #header-container { margin-bottom: 20px; }
        h1 { 
            font-size: 28px; 
            color: #00ff00; 
            text-shadow: 2px 2px #000;
            margin: 0;
        }
        p.subtitle { 
            font-size: 18px; 
            color: #aaaaaa; 
            margin-top: 10px; 
        }

        #arena { 
            position: relative; 
            width: 800px; 
            height: 250px; 
            margin: 0 auto; 
            border-bottom: 4px solid #00ff00; 
        }

        .character { 
            position: absolute; 
            bottom: 0; 
            width: 160px; 
            height: 200px; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: bottom center; 
            transition: all 0.3s ease-out;
            z-index: 1;
        }
        
        #left-char { left: 50px; }
        #right-char { 
            right: 50px; 
            transform: scaleX(-1); 
        }     

        #cards-container { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            width: 1100px; 
            margin: 30px auto 0; 
        }

        .candidate-card { 
            border: 4px solid #00ff00; 
            padding: 25px; 
            width: 480px; 
            cursor: pointer; 
            background: #000; 
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            display: flex; 
            flex-direction: column; 
            text-align: left;
            transition: all 0.2s ease;
        }

        .candidate-card:hover { 
            border-color: #ff00ff; 
            box-shadow: 0 0 20px #ff00ff;
            transform: translateY(-5px);
        }

        h2 { 
            font-size: 22px; 
            color: #ff00ff; 
            margin: 0 0 15px 0; 
            font-weight: 700;
            text-transform: uppercase;
        }

        .desc { 
            font-size: 17px; 
            line-height: 1.5; 
            color: #ffffff; 
            font-weight: 400;
        }

        .selected-card {
            border-color: #ff00ff !important;
            box-shadow: 0 0 30px #ff00ff !important;
        }

        .attack-effect { filter: brightness(1.3) !important; z-index: 10 !important; }
        
        .defeat-effect { 
            opacity: 0; 
            transform: translateY(-40px) rotate(20deg) scale(0.7) !important; 
            filter: grayscale(1) brightness(0.5) !important;
            transition: 0.6s ease-in;
        }

        #final-screen { 
            display: none; 
            border: 8px double #ff00ff; 
            padding: 40px; 
            width: 600px; 
            margin: 0 auto; 
            background: #000; 
        }

        button {
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: 18px;
            padding: 12px 25px;
            cursor: pointer;
            background: #00ff00;
            border: none;
            color: #000;
            margin-top: 20px;
        }
        button:hover { background: #ff00ff; color: #fff; }
    </style>
</head>
<body>

    <div id="game-layout">
        <div id="header-container">
            <h1 id="round-title">QUARTER-FINALS</h1>
            <p class="subtitle">Select the candidate to proceed to the next round.</p>
        </div>

        <div id="arena">
            <div id="left-char" class="character"></div>
            <div id="right-char" class="character"></div>
        </div>

        <div id="cards-container">
            <div id="left-card" class="candidate-card" onclick="select('left')" onmouseover="hoverChar('left', true)" onmouseout="hoverChar('left', false)">
                <h2 id="left-name">Loading...</h2>
                <div id="left-desc" class="desc"></div>
            </div>
            <div id="right-card" class="candidate-card" onclick="select('right')" onmouseover="hoverChar('right', true)" onmouseout="hoverChar('right', false)">
                <h2 id="right-name">Loading...</h2>
                <div id="right-desc" class="desc"></div>
            </div>
        </div>
    </div>

    <div id="final-screen">
        <h1 style="color: #00ff00;">TOURNAMENT CHAMPION</h1>
        <h2 id="winner-name" style="font-size: 32px; margin: 20px 0;"></h2>
        <p style="font-size: 18px; line-height: 1.6;">The evaluation is complete.<br>This profile represents the optimal choice.</p>
        <button onclick="location.reload()">RESTART TOURNAMENT</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxlGvKgLbutYrPnQQrlTkMAvB1n2RjNyKt5zN8vwTenzuxt6dCBDtQaucE2gQMsdRZv/exec';

        const candidates = [
            { name: "The Gap Strategist", desc: "12+ years of work experience, but 3-year parental leave.", img_idle: "Ancient_Idle_MiniCavalierMan.gif", img_attack: "Ancient_Attack1_MiniCavalierMan.gif", img_walk: "Ancient_Walk_MiniCavalierMan.gif" },
            { name: "The Continuous Mid-Weight", desc: "5 years uninterrupted experience, but didn't face real challanges.", img_idle: "Common_Idle_MiniCavalierMan.gif", img_attack: "Common_Attack1_MiniCavalierMan.gif", img_walk: "Common_Walk_MiniCavalierMan.gif" },
            { name: "The Award-Winner", desc: "Multiple awards, strong creative vision, but not a technically capable 'doer'.", img_idle: "Epic_Idle_MiniCavalierMan.gif", img_attack: "Epic_Attack1_MiniCavalierMan.gif", img_walk: "Epic_Walk_MiniCavalierMan.gif" },
            { name: "The Technical Tool-Master", desc: "Expert mastery of advanced technical tools and software, but not a visionary.", img_idle: "Epic_2_Idle_MiniCavalierMan.gif", img_attack: "Epic_2_Attack1_MiniCavalierMan.gif", img_walk: "Epic_2_Walk_MiniCavalierMan.gif" },
            { name: "The Corporate Veteran", desc: "Experience in English spoken international companies, but not in smaller, local companies; doesn't know the local language.", img_idle: "Legendary_Idle_MiniCavalierMan.gif", img_attack: "Legendary_Attack1_MiniCavalierMan.gif", img_walk: "Legendary_Walk_MiniCavalierMan.gif" },
            { name: "The AI Visionary", desc: "Expert in AI-powered tools, but can't manually use a technical app/write code.", img_idle: "Legendary_2_Idle_MiniCavalierMan.gif", img_attack: "Legendary_2_Attack1_MiniCavalierMan.gif", img_walk: "Legendary_2_Walk_MiniCavalierMan.gif" },
            { name: "The Hybrid Strategist", desc: "Versatile profile combining different work expertise, but not an expert in any of them.", img_idle: "Rare_Idle_MiniCavalierMan.gif", img_attack: "Rare_Attack1_MiniCavalierMan.gif", img_walk: "Rare_Walk_MiniCavalierMan.gif" },
            { name: "The Local Junior", desc: "Native language, deep understanding of cultural context, but a new grad; almost no job experience.", img_idle: "Uncommon_Idle_MiniCavalierMan.gif", img_attack: "Uncommon_Attack1_MiniCavalierMan.gif", img_walk: "Uncommon_Walk_MiniCavalierMan.gif" }
        ];

        let currentRound = [...candidates].sort(() => 0.5 - Math.random());
        let nextRound = [];
        let index = 0;
        let roundNames = { 8: "QUARTER-FINALS", 4: "SEMI-FINALS", 2: "THE GRAND FINAL" };

        function update() {
            if (index < currentRound.length) {
                const c1 = currentRound[index];
                const c2 = currentRound[index + 1];

                document.getElementById('round-title').innerText = roundNames[currentRound.length] || "TOURNAMENT";
                document.getElementById('left-name').innerText = c1.name;
                document.getElementById('left-desc').innerText = c1.desc;
                document.getElementById('right-name').innerText = c2.name;
                document.getElementById('right-desc').innerText = c2.desc;

                resetArena();
            }
        }

        function resetArena() {
            const leftChar = document.getElementById('left-char');
            const rightChar = document.getElementById('right-char');
            
            leftChar.style.backgroundImage = `url('assets/${currentRound[index].img_idle}')`;
            rightChar.style.backgroundImage = `url('assets/${currentRound[index+1].img_idle}')`;
            
            leftChar.className = 'character';
            rightChar.className = 'character';
            
            leftChar.style.left = "50px";
            rightChar.style.right = "50px";
            leftChar.style.filter = "none";
            rightChar.style.filter = "none";
            leftChar.style.transform = "none";
            rightChar.style.transform = "scaleX(-1)"; 
        }

        function hoverChar(side, isHovering) {
            const char = document.getElementById(side + '-char');
            const candidate = side === 'left' ? currentRound[index] : currentRound[index+1];
            
            if (isHovering) {
                char.style.backgroundImage = `url('assets/${candidate.img_walk}')`;
                if(side === 'left') char.style.left = "180px";
                else char.style.right = "180px";
            } else {
                char.style.backgroundImage = `url('assets/${candidate.img_idle}')`;
                if(side === 'left') char.style.left = "50px";
                else char.style.right = "50px";
            }
        }

        function select(side) {
            const winnerIdx = side === 'left' ? index : index + 1;
            const loserSide = side === 'left' ? 'right' : 'left';
            const winner = currentRound[winnerIdx];
            
            const winnerChar = document.getElementById(side + '-char');
            const loserChar = document.getElementById(loserSide + '-char');
            const selectedCard = document.getElementById(side + '-card');

            selectedCard.classList.add('selected-card');
            winnerChar.style.backgroundImage = `url('assets/${winner.img_attack}')`;
            winnerChar.classList.add('attack-effect');
            
            if(side === 'right') winnerChar.style.transform = "scaleX(-1)";
            
            if(side === 'left') winnerChar.style.left = "280px";
            else winnerChar.style.right = "280px";

            loserChar.classList.add('defeat-effect');

            nextRound.push(winner);
            index += 2;

            setTimeout(() => {
                selectedCard.classList.remove('selected-card');
                if (index >= currentRound.length) {
                    if (nextRound.length === 1) { finish(nextRound[0]); } 
                    else { 
                        currentRound = [...nextRound]; 
                        nextRound = []; 
                        index = 0; 
                        update(); 
                    }
                } else { update(); }
            }, 1200);
        }

        function finish(winner) {
            document.getElementById('game-layout').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('winner-name').innerText = winner.name;

            fetch(scriptURL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ winner: winner.name, status: "CHAMPION" }) 
            });
        }

        update();
    </script>
</body>
</html>
